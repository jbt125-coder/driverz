function submitScore(name, score){
if(DREAMLO_PRIVATE===‘YOUR_PRIVATE_KEY_HERE’) return; // skip if not configured
let url = DREAMLO_URL + DREAMLO_PRIVATE + ‘/add/’ +
encodeURIComponent(name) + ‘/’ + score;
fetch(url).catch(()=>{}); // fire and forget
}

function fetchLeaderboard(){
if(DREAMLO_PUBLIC===‘YOUR_PUBLIC_KEY_HERE’){
// Use fake demo data so the screen looks good
leaderboard=[
{name:‘PRO GOLFER’, score:280},
{name:‘ACE’, score:240},
{name:‘EAGLE EYE’, score:210},
{name:‘BIRDIE’, score:185},
{name:‘PAR PLAYER’, score:160},
];
leaderboardStatus=‘done’; return;
}
leaderboardStatus=‘loading’;
fetch(DREAMLO_URL + DREAMLO_PUBLIC + ‘/json/5’)
.then(r=>r.json())
.then(data=>{
let entries = data?.dreamlo?.leaderboard?.entry;
if(!entries) { leaderboardStatus=‘done’; leaderboard=[]; return; }
if(!Array.isArray(entries)) entries=[entries];
leaderboard = entries.map(e=>({name:String(e.name), score:parseInt(e.score)}));
leaderboardStatus=‘done’;
})
.catch(()=>{ leaderboardStatus=‘error’; leaderboard=[]; });
}

function drawLeaderboard(x, y, w, h, title){
// Panel
ctx.fillStyle=‘rgba(0,10,0,0.82)’;

const TARGETS = [

// ── NPC DEFINITIONS ──
function makeNPC(type, side) {
let x = side === ‘left’ ? W*0.12 : W*0.88;
return {type, x, y:H*0.78, side, swingT:0, swinging:false, swingTimer: 60 + Math.random()*180, frame:0};
}

// ── HELPERS ──
function rnd(a,b){return a+Math.random()*(b-a);}
function lerp(a,b,t){return a+(b-a)*t;}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function addFloat(x,y,txt,color,size){
floatTexts.push({x,y,txt,color,size:size||16,life:1.0,vy:-1.5});
}

// ── DRAWING HELPERS ──
function px(x){return Math.round(x);}
function py(y){return Math.round(y);}

function drawPixelRect(x,y,w,h,color){
ctx.fillStyle=color;
ctx.fillRect(px(x),py(y),Math.ceil(w),Math.ceil(h));
}

function drawPixelCircle(x,y,r,color){
ctx.fillStyle=color;
ctx.beginPath();
ctx.arc(px(x),py(y),r,0,Math.PI*2);
ctx.fill();
}

function drawText(txt,x,y,color,size,align){
ctx.fillStyle=color||C.white;
ctx.font=`bold ${size||14}px monospace`;
ctx.textAlign=align||‘center’;
ctx.textBaseline=‘middle’;
ctx.fillText(txt,px(x),py(y));
}

function drawOutlineText(txt,x,y,color,outline,size,align){
ctx.font=`bold ${size||14}px monospace`;
ctx.textAlign=align||‘center’;
ctx.textBaseline=‘middle’;
ctx.strokeStyle=outline||C.black;
ctx.lineWidth=3;
ctx.strokeText(txt,px(x),py(y));
ctx.fillStyle=color||C.white;
ctx.fillText(txt,px(x),py(y));
}

// ── DRAW RANGE BACKGROUND ──
function drawRange(){
// ── Sky: light blue top to pale horizon
let sky=ctx.createLinearGradient(0,0,0,H*0.52);
sky.addColorStop(0,’#b8dff0’);
sky.addColorStop(0.5,’#ceeaf8’);
sky.addColorStop(1,’#dff2fb’);
ctx.fillStyle=sky;
ctx.fillRect(0,0,W,H*0.52);

// ── Soft flat clouds
drawFlatCloud(W*0.12, H*0.07, 52, 16);
drawFlatCloud(W*0.62, H*0.05, 44, 13);
drawFlatCloud(W*0.85, H*0.12, 34, 10);

// ── Back mountains (blue-grey, tallest, 3 peaks)
drawSmoothMountains(
[{x:W*0.10,h:H*0.17},{x:W*0.28,h:H*0.24},{x:W*0.50,h:H*0.28},
{x:W*0.72,h:H*0.22},{x:W*0.90,h:H*0.16}],
H*0.42, ‘#8ab4c8’, ‘#a8ccdc’
);

// ── Mid mountains (teal-blue, slightly in front)
drawSmoothMountains(
[{x:W*0.0,h:H*0.10},{x:W*0.18,h:H*0.16},{x:W*0.38,h:H*0.20},
{x:W*0.58,h:H*0.18},{x:W*0.78,h:H*0.14},{x:W*1.0,h:H*0.09}],
H*0.46, ‘#7aaa9e’, ‘#90bfb4’
);

// ── Back rolling hill (dark green)
drawRollingHill(H*0.48, H*0.10, ‘#4a7a3a’);

// ── Mid rolling hill (bright green)
drawRollingHill(H*0.53, H*0.08, ‘#5a9a44’);

// ── Fairway grass — perspective strips from horizon to tee
let horizonY = H*0.52;
let grassColors = [’#5aaa48’,’#52983e’,’#5aaa48’,’#4e9038’,’#56a042’,’#4e9038’,’#52983e’,’#5aaa48’];
for(let i=0;i<8;i++){
let y0 = horizonY + i*(H*0.30/8);
let y1 = horizonY + (i+1)*(H*0.30/8);
ctx.fillStyle = grassColors[i];
ctx.fillRect(0, py(y0), W, py(y1)-py(y0)+1);
}

// ── Horizon shimmer line
ctx.fillStyle=’#6abf52’;
for(let xi=0;xi<W;xi+=3){
let h2=2+Math.sin(frameCount*0.04+xi*0.25)*1.5;
ctx.fillRect(xi, py(horizonY-h2), 2, h2+1);
}

// ── Pine trees along horizon (like reference)
let treeYBase = H*0.49;
let treeSizes=[12,10,14,9,11,13,10,12,9,11];
let treeXs=[0.04,0.10,0.16,0.83,0.88,0.93,0.97];
treeXs.forEach((xf,i)=>drawPineTree(W*xf, treeYBase, treeSizes[i%treeSizes.length]));

// ── Distance yardage markers
drawYardagePost(W*0.10, H*0.68, ‘50’);
drawYardagePost(W*0.90, H*0.68, ‘50’);
drawYardagePost(W*0.08, H*0.60, ‘100’);
drawYardagePost(W*0.92, H*0.60, ‘100’);
drawYardagePost(W*0.06, H*0.53, ‘150’);
drawYardagePost(W*0.94, H*0.53, ‘150’);

// ── Tee mat

ctx.fillStyle=’#2a4a1e’;

// ── Ground below tee
ctx.fillStyle=’#2a1a08’;
ctx.fillRect(0,H*0.87,W,H*0.13);
ctx.fillStyle=’#1a1208’;
for(let xi=0;xi<W;xi+=20){ ctx.fillRect(xi,H*0.87,10,H*0.03); }

// Smooth mountain range from peak array
function drawSmoothMountains(peaks, baseY, colorMain, colorLight){
// Main fill
ctx.fillStyle=colorMain;
ctx.beginPath();
ctx.moveTo(0,baseY);
ctx.lineTo(peaks[0].x, baseY-peaks[0].h);
for(let i=1;i<peaks.length;i++){
let prev=peaks[i-1], cur=peaks[i];
let cx=(prev.x+cur.x)/2;
ctx.bezierCurveTo(cx,baseY-prev.h, cx,baseY-cur.h, cur.x,baseY-cur.h);
}
ctx.lineTo(W,baseY);
ctx.closePath();
ctx.fill();

// Highlight layer (lighter tone on upper slopes)
ctx.fillStyle=colorLight;
ctx.globalAlpha=0.35;
ctx.beginPath();
ctx.moveTo(peaks[0].x-W*0.05, baseY-peaks[0].h*0.4);
for(let i=0;i<peaks.length;i++){
let p=peaks[i];
if(i===0) ctx.lineTo(p.x, baseY-p.h);
else {
let prev=peaks[i-1];
let cx=(prev.x+p.x)/2;
ctx.bezierCurveTo(cx,baseY-prev.h,cx,baseY-p.h,p.x,baseY-p.h);
}
ctx.lineTo(p.x+W*0.03, baseY-p.h*0.4);
}
ctx.closePath();
ctx.fill();
ctx.globalAlpha=1;
}

// Soft rolling hill silhouette
function drawRollingHill(baseY, bumpH, color){
ctx.fillStyle=color;
ctx.beginPath();
ctx.moveTo(0,baseY);
let steps=8;
for(let i=0;i<=steps;i++){
let x=W*i/steps;
let y=baseY - Math.sin(i/steps*Math.PI)*bumpH;
i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
}
ctx.lineTo(W,H);
ctx.lineTo(0,H);
ctx.closePath();
ctx.fill();
}

// Flat wispy cloud (like reference — elongated ovals)
function drawFlatCloud(x,y,w,h){
ctx.globalAlpha=0.88;
ctx.fillStyle=’#ffffff’;
ctx.beginPath(); ctx.ellipse(px(x),py(y),w,h,0,0,Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.ellipse(px(x+w*0.4),py(y+h*0.2),w*0.6,h*0.7,0,0,Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.ellipse(px(x-w*0.35),py(y+h*0.25),w*0.55,h*0.65,0,0,Math.PI*2); ctx.fill();
ctx.globalAlpha=1;
}

// Pine/fir tree silhouette (like reference)
function drawPineTree(x,y,size){
ctx.fillStyle=’#2d5a28’;
// Three triangle tiers
for(let tier=0;tier<3;tier++){
let tw=size*(1-tier*0.25);
let ty=y-tier*(size*0.55);
ctx.beginPath();
ctx.moveTo(px(x), py(ty-size*0.7));
ctx.lineTo(px(x+tw), py(ty));
ctx.lineTo(px(x-tw), py(ty));
ctx.closePath();
ctx.fill();
}
// Trunk
ctx.fillStyle=’#4a2a10’;
ctx.fillRect(px(x-size*0.12),py(y),Math.ceil(size*0.24),size*0.4);
}

function drawPixelCloud(x,y,r){
ctx.globalAlpha=0.85;
drawPixelCircle(x,y,r,C.white);
drawPixelCircle(x+r*0.7,y+r*0.2,r*0.75,C.white);
drawPixelCircle(x-r*0.6,y+r*0.3,r*0.65,C.white);
drawPixelCircle(x+r*0.1,y+r*0.5,r*0.55,C.white);
ctx.globalAlpha=1;
}

function drawPixelTree(x,y,r){
// trunk
drawPixelRect(x-r*0.2,y,r*0.4,r*1.2,C.brown);
// canopy layers
drawPixelCircle(x,y-r*0.3,r*1.1,C.grassDark);
drawPixelCircle(x,y-r*0.8,r*0.85,C.grass);
drawPixelCircle(x,y-r*1.2,r*0.6,C.grassLight);
}

function drawYardagePost(x,y,label){
ctx.fillStyle=C.white;
ctx.fillRect(px(x-1),py(y),2,12);
ctx.fillStyle=’#3355cc’;
ctx.fillRect(px(x-8),py(y-10),16,10);
drawText(label,x,y-5,’#fff’,7);
}

// ── DRAW TARGETS ──
function drawTargets(){
TARGETS.forEach(t=>{
// Shadow
ctx.globalAlpha=0.25;
drawPixelCircle(t.x+3,t.y+4,t.r+2,C.black);
ctx.globalAlpha=1;
// Outer ring
drawPixelCircle(t.x,t.y,t.r+4,C.white);
drawPixelCircle(t.x,t.y,t.r+2,t.color);
drawPixelCircle(t.x,t.y,t.r,C.white);
// Inner dot
drawPixelCircle(t.x,t.y,t.r*0.35,t.color);
// Flag pole
ctx.fillStyle=C.darkBrown;
ctx.fillRect(px(t.x),py(t.y-t.r-14),2,14);
// Flag
ctx.fillStyle=t.color;
ctx.beginPath();
ctx.moveTo(px(t.x+2),py(t.y-t.r-14));
ctx.lineTo(px(t.x+10),py(t.y-t.r-10));
ctx.lineTo(px(t.x+2),py(t.y-t.r-6));
ctx.fill();
// Points label
drawText(t.pts+‘pt’,t.x,t.y+t.r+9,t.color,9);
});
}

// ── DRAW AIMER ──
function drawAimer(){
let ax=aimer.x, ay=aimer.y;
let pulse=0.6+0.4*Math.sin(frameCount*0.12);
let r=12+4*pulse;
ctx.globalAlpha=0.7*pulse;
ctx.strokeStyle=’#fff’;
ctx.lineWidth=2;
ctx.beginPath(); ctx.arc(px(ax),py(ay),r,0,Math.PI*2); ctx.stroke();
ctx.beginPath(); ctx.arc(px(ax),py(ay),r*0.5,0,Math.PI*2); ctx.stroke();
// crosshair
ctx.beginPath(); ctx.moveTo(px(ax-r*1.4),py(ay)); ctx.lineTo(px(ax-r*0.7),py(ay)); ctx.stroke();
ctx.beginPath(); ctx.moveTo(px(ax+r*0.7),py(ay)); ctx.lineTo(px(ax+r*1.4),py(ay)); ctx.stroke();
ctx.beginPath(); ctx.moveTo(px(ax),py(ay-r*1.4)); ctx.lineTo(px(ax),py(ay-r*0.7)); ctx.stroke();
ctx.beginPath(); ctx.moveTo(px(ax),py(ay+r*0.7)); ctx.lineTo(px(ax),py(ay+r*1.4)); ctx.stroke();
ctx.globalAlpha=1;
}

// ── DRAW GOLFER (PLAYER) ──
// Pixel art golfer at bottom center, swing animation
function drawGolfer(x, y, swingT, swingPhase){
// swingT 0=address, 0.5=top of backswing, 1=impact/follow
ctx.save();
ctx.translate(px(x),py(y));

let legSpread = 8;
// Shadow
ctx.globalAlpha=0.2;
drawPixelCircle(0,2,16,C.black);
ctx.globalAlpha=1;

// Legs
drawPixelRect(-legSpread,-2,7,18,C.blue); // left leg
drawPixelRect(legSpread-7,-2,7,18,C.blue); // right leg
// Shoes
drawPixelRect(-legSpread-2,14,10,5,C.black);
drawPixelRect(legSpread-5,14,10,5,C.black);

// Body
drawPixelRect(-8,-18,16,20,C.red);
// Belt
drawPixelRect(-8,-2,16,3,C.darkBrown);

// Head
drawPixelCircle(0,-28,10,C.skinLight);
// Cap visor
ctx.fillStyle=’#cc2222’;
ctx.fillRect(-10,-37,20,8);
ctx.fillRect(10,-34,6,4); // visor brim
// Eyes
ctx.fillStyle=C.black;
ctx.fillRect(-4,-29,3,3);
ctx.fillRect(2,-29,3,3);
// Smile
ctx.fillStyle=C.skinDark;
ctx.fillRect(-3,-24,7,2);

// Club & arms based on swing phase
let shoulderY = -16;
if(swingPhase===‘idle’||swingPhase===‘address’){
// address position - arms down, club at ball
drawArm(ctx, -5, shoulderY, -9, 2, 5); // left arm
drawArm(ctx, 5, shoulderY, 9, 2, 5);  // right arm
// Club shaft
ctx.strokeStyle=C.darkBrown;
ctx.lineWidth=2;
ctx.beginPath(); ctx.moveTo(9,2); ctx.lineTo(18,18); ctx.stroke();
// Club head
ctx.fillStyle=C.gray;
ctx.fillRect(15,16,8,5);
} else if(swingPhase===‘windup’){
// backswing
let t=swingT;
let armAngle = t * -2.2; // rotate arms up and back
ctx.save();
ctx.rotate(armAngle*0.3);
drawArm(ctx,-4,shoulderY,-14+t*8,-2+t*-12,5);
drawArm(ctx,4,shoulderY,-2+t*4,0+t*-8,5);
// Club going up
ctx.strokeStyle=C.darkBrown; ctx.lineWidth=2;
ctx.beginPath(); ctx.moveTo(-2+t*-10,-4+t*-10); ctx.lineTo(-18*t,-20*t-2); ctx.stroke();
ctx.fillStyle=C.gray; ctx.fillRect(-20*t-4,-22*t,7,4);
ctx.restore();
} else if(swingPhase===‘swing’||swingPhase===‘follow’){
let t=swingT;
// follow through - arms swing through to left
ctx.save();
let rot = -0.5+t*1.8;
ctx.rotate(rot*0.2);
drawArm(ctx,-5,shoulderY,-8+t*-12,-2+t*4,5);
drawArm(ctx,4,shoulderY,6+t*-10,0+t*2,5);
// Club following through to left
ctx.strokeStyle=C.darkBrown; ctx.lineWidth=2;
ctx.beginPath();
ctx.moveTo(8-t*22,2-t*8);
ctx.lineTo(16-t*36,18-t*28);
ctx.stroke();
ctx.fillStyle=C.gray; ctx.fillRect(13-t*36,15-t*28,7,4);
ctx.restore();
}

ctx.restore();
}

function drawArm(ctx, sx, sy, ex, ey, w){
ctx.strokeStyle=C.skinLight;
ctx.lineWidth=w;
ctx.lineCap=‘round’;
ctx.beginPath();
ctx.moveTo(px(sx),py(sy));
ctx.lineTo(px(ex),py(ey));
ctx.stroke();
}

// ── DRAW NPCs ──
function drawNPC(npc){
if(!npc) return;
ctx.save();
ctx.translate(px(npc.x),py(npc.y));
if(npc.side===‘right’) ctx.scale(-1,1);

let swing = npc.swingT||0;
let phase = npc.swinging ? (swing<0.4?‘windup’:‘swing’) : ‘address’;

switch(npc.type){
case ‘pro’: drawNPCPro(phase,swing); break;
case ‘girl’: drawNPCGirl(phase,swing); break;
case ‘nerd’: drawNPCNerd(phase,swing); break;
case ‘doc’: drawNPCDoc(phase,swing); break;
}
ctx.restore();
}

ctx.globalAlpha=0.15*(5-i)/4;
drawPixelCircle(tex,tey+tarc,3,C.white);
}
ctx.globalAlpha=1;
}); // end ballFlights.forEach
}

// ── TITLE SCREEN ──
function updateTitleDemo(){
// Update flying balls
titleDemo.balls = titleDemo.balls.filter(b=>{
b.t += 0.03;
if(b.t>=1){
// flash on target
titleDemo.hitFlashes.push({x:b.tx, y:b.ty, color:b.color, life:1.0});
return false;
}
return true;
});
titleDemo.hitFlashes = titleDemo.hitFlashes.filter(f=>{ f.life-=0.04; return f.life>0; });

// Golfer swing cycle
if(titleDemo.swingPhase===‘idle’){
titleDemo.idleTimer–;
if(titleDemo.idleTimer<=0){
titleDemo.swingPhase=‘windup’;
titleDemo.swingT=0;
}
} else {
titleDemo.swingT += 0.055;
if(titleDemo.swingPhase===‘windup’ && titleDemo.swingT>=1){
titleDemo.swingPhase=‘swing’; titleDemo.swingT=0;
// Fire ball at current target
let tgt = titleDemo.targets[titleDemo.currentTarget];
titleDemo.balls.push({t:0, tx:tgt.x, ty:tgt.y, color:tgt.color});
titleDemo.currentTarget = (titleDemo.currentTarget+1) % titleDemo.targets.length;
} else if(titleDemo.swingPhase===‘swing’ && titleDemo.swingT>=1){
titleDemo.swingPhase=‘follow’; titleDemo.swingT=0;
} else if(titleDemo.swingPhase===‘follow’ && titleDemo.swingT>=1){
titleDemo.swingPhase=‘idle’; titleDemo.swingT=0;
titleDemo.idleTimer = 60 + Math.random()*60;
}
}
}

function drawTitleDemoBall(b){
let t=b.t;
let sx=W/2, sy=H*0.76;
let ex=b.tx, ey=b.ty;
let bx=lerp(sx,ex,t);
let by=lerp(sy,ey,t) - Math.sin(t*Math.PI)*55;
ctx.globalAlpha=0.85;
drawPixelCircle(bx,by,5,C.white);
ctx.strokeStyle=’#ccc’; ctx.lineWidth=1;
ctx.beginPath(); ctx.arc(px(bx),py(by),5,0,Math.PI*2); ctx.stroke();
// trail
for(let i=1;i<=3;i++){
let tt=Math.max(0,t-i*0.05);
let tx2=lerp(sx,ex,tt), ty2=lerp(sy,ey,tt)-Math.sin(tt*Math.PI)*55;
ctx.globalAlpha=0.2*(4-i)/3;
drawPixelCircle(tx2,ty2,3,C.white);
}
ctx.globalAlpha=1;
}

function drawTitle(){
// BG
let sg=ctx.createLinearGradient(0,0,0,H);
sg.addColorStop(0,’#0a1a0a’); sg.addColorStop(1,’#1a3a0e’);
ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
ctx.strokeStyle=’#1a4a1a’; ctx.lineWidth=1;
for(let xi=0;xi<W;xi+=24){ctx.beginPath();ctx.moveTo(xi,0);ctx.lineTo(xi,H);ctx.stroke();}
for(let yi=0;yi<H;yi+=24){ctx.beginPath();ctx.moveTo(0,yi);ctx.lineTo(W,yi);ctx.stroke();}

// Mountains silhouette
ctx.fillStyle=’#1a2a18’;
ctx.beginPath(); ctx.moveTo(0,H*0.55);
[0,0.15,0.28,0.42,0.56,0.70,0.84,1.0].forEach((xf,i)=>{
let yf=i%2===0?H*0.42:H*0.50;
ctx.lineTo(W*xf, yf);
});
ctx.lineTo(W,H*0.55); ctx.closePath(); ctx.fill();

// Grass ground strip
ctx.fillStyle=’#1a3a12’;
ctx.fillRect(0,H*0.80,W,H*0.20);
ctx.fillStyle=’#22441a’;
ctx.fillRect(0,H*0.80,W,8);

// Title logo
let pulse=0.92+0.08*Math.sin(frameCount*0.07);
ctx.save(); ctx.translate(W/2, H*0.12); ctx.scale(pulse,pulse);
ctx.shadowColor=C.neonGreen; ctx.shadowBlur=22;
drawOutlineText(‘DRIVERZ’,0,0,C.gold,C.black,54);
ctx.shadowBlur=0; ctx.restore();

// Demo targets on title screen
updateTitleDemo();
titleDemo.targets.forEach((t,i)=>{
// Flash on hit
let flash = titleDemo.hitFlashes.find(f=>f.x===t.x&&f.y===t.y);

function placeHole(){
putt.holX=rnd(W*0.18,W*0.82);
putt.holY=rnd(H*0.18,H*0.62);
// Phase: 0=small(3pts), 1=big(1pt), 2=small red(3pts), 3=gone
putt.holePhase=0;
putt.holeTimer=0;
putt.holeR=8; // starts small
}

function spawnCritter(){
if(putt.critters.length>=6) return;
let types=[‘frog’,‘bunny’,‘gator’];
// weight: more frogs, fewer gators
let weights=[0.5,0.35,0.15];
let r=Math.random(), cum=0, type=‘frog’;
for(let i=0;i<types.length;i++){ cum+=weights[i]; if(r<cum){type=types[i];break;} }
let cr={
type,
x:rnd(W*0.08,W*0.92),
y:rnd(H*0.15,H*0.72),
vx:rnd(-1.2,1.2)||(Math.random()<0.5?0.6:-0.6),
vy:rnd(-0.8,0.8)||(Math.random()<0.5?0.5:-0.5),
r: type===‘gator’?22:type===‘bunny’?12:13,
hopT:0, hopTimer:rnd(30,80),
penalty: type===‘frog’?-1:type===‘bunny’?-2:-3,
hit:false
};
putt.critters.push(cr);
}

function updateHalftime(dt){
putt.timeLeft=Math.max(0,putt.timeLeft-dt);
if(putt.timeLeft<=0){ state=‘halftime_result’; return; }

// ── Hole phase cycle
putt.holeTimer+=dt;
// small(3pts)=2.5s, big(1pt)=2s, small red(3pts)=1.5s, gone=0.4s
let phaseDurs=[2.5,2.0,1.5,0.4];
if(putt.holeTimer>phaseDurs[putt.holePhase]){
putt.holePhase=(putt.holePhase+1)%4;
putt.holeTimer=0;
if(putt.holePhase===3) setTimeout(()=>placeHole(),400);
putt.holeR = (putt.holePhase===1)?20:10; // big on phase 1
}

// ── Putter visual anim
if(putt.swingAnim>0){ putt.swingAnim=Math.max(0,putt.swingAnim-dt*5); }

// ── Active balls movement (rapid fire — many balls at once)
putt.activeBalls=putt.activeBalls.filter(b=>{
b.x+=b.vx; b.y+=b.vy;

function updateAimer(){
// Aimer ALWAYS moves — never freezes
let dy=Math.abs(aimer.y-(H*0.83));
let speedMult=0.8+dy/200;
aimer.x+=aimer.vx*speedMult;
aimer.y+=aimer.vy*speedMult;
// Bounce in range area
if(aimer.x<W*0.08||aimer.x>W*0.92) aimer.vx*=-1;
if(aimer.y<H*0.35||aimer.y>H*0.75) aimer.vy*=-1;
// Add slight random drift
if(Math.random()<0.02) aimer.vx+=rnd(-0.3,0.3);
if(Math.random()<0.02) aimer.vy+=rnd(-0.3,0.3);
// Clamp speed
let spd=Math.hypot(aimer.vx,aimer.vy);
if(spd>3){ aimer.vx=aimer.vx/spd*3; aimer.vy=aimer.vy/spd*3; }
if(spd<0.8){ let ratio=0.8/spd; aimer.vx*=ratio; aimer.vy*=ratio; }
}

// ── FROG UPDATE ──
function updateFrog(){
if(!frogOnRange){
if(Math.random()<0.003){
let t=TARGETS[Math.floor(Math.random()*TARGETS.length)];
let fromLeft=Math.random()<0.5;
frogOnRange={
destX:t.x+rnd(-15,15),
destY:t.y+rnd(-8,8),
x:fromLeft?-20:W+20,
y:t.y+rnd(-10,10),
vx:0,vy:0,
hopPhase:0, // 0=hopping in, 1=idle at target
hopT:0,hopTimer:0,
life:350+Math.random()*200,
arriving:true
};
}
return;
}
frogOnRange.life–;
if(frogOnRange.life<=0){ frogOnRange=null; return; }

if(frogOnRange.arriving){
// Hop toward destination in discrete jumps
frogOnRange.hopTimer–;
if(frogOnRange.hopTimer<=0){
frogOnRange.hopT=1.0;
frogOnRange.hopTimer=22+Math.random()*10;
// step closer
let dx=frogOnRange.destX-frogOnRange.x;
let dy=frogOnRange.destY-frogOnRange.y;
let stepLen=Math.min(Math.hypot(dx,dy), 30+Math.random()*20);
let ang=Math.atan2(dy,dx);
frogOnRange.prevX=frogOnRange.x;
frogOnRange.prevY=frogOnRange.y;
frogOnRange.x+=Math.cos(ang)*stepLen;
frogOnRange.y+=Math.sin(ang)*stepLen;
if(Math.hypot(frogOnRange.destX-frogOnRange.x, frogOnRange.destY-frogOnRange.y)<20){
frogOnRange.arriving=false;
}
}
if(frogOnRange.hopT>0) frogOnRange.hopT=Math.max(0,frogOnRange.hopT-0.08);
} else {
// Idle at target: small random hops
frogOnRange.hopTimer–;
if(frogOnRange.hopTimer<=0){
frogOnRange.hopT=1.0;
frogOnRange.hopTimer=45+Math.random()*40;
frogOnRange.x+=rnd(-12,12);
frogOnRange.y+=rnd(-6,6);
frogOnRange.x=clamp(frogOnRange.x,W*0.1,W*0.9);
frogOnRange.y=clamp(frogOnRange.y,H*0.38,H*0.76);
}
if(frogOnRange.hopT>0) frogOnRange.hopT=Math.max(0,frogOnRange.hopT-0.1);
}
}

function launchBall(){
let tx=aimer.x, ty=aimer.y;
let hit=null;
let minD=999;

// Check bird first — +10 points and poop!
let birdHit=birds.find(b=>dist(tx,ty,b.x,b.y)<35);
if(birdHit){
totalScore+=10;
ballFlights.push({tx:birdHit.x,ty:birdHit.y,t:0,score:10,hit:‘bird’,birdRef:birdHit});
addFloat(birdHit.x,birdHit.y-15,’+10 BIRDIE!’,C.orange,16);
// Bird dives toward golfer and poops
birdHit.diving=true;
birdHit.diveTarget={x:W/2,y:H*0.82};
return;
}

// Check fox — hit fox to trigger ball collection
if(foxOnRange && dist(tx,ty,foxOnRange.x,foxOnRange.y)<45){
foxOnRange.state=‘hit’;
foxOnRange.ballCount=balls.length;
addFloat(foxOnRange.x,foxOnRange.y-20,‘FOX HIT! COLLECTING BALLS!’,C.foxOrange,13);
ballFlights.push({tx:foxOnRange.x,ty:foxOnRange.y,t:0,score:0,hit:‘fox_hit’});
return;
}

// Check frog — hit frog = double points on next target
if(frogOnRange && dist(tx,ty,frogOnRange.x,frogOnRange.y)<38){
// Find nearest target to frog and score double
let nearT=null, nearD=999;
TARGETS.forEach(t=>{
let d=dist(frogOnRange.x,frogOnRange.y,t.x,t.y);
if(d<nearD){nearD=d;nearT=t;}
});
let pts=(nearT?nearT.pts:1)*2;
totalScore+=pts;
addFloat(frogOnRange.x,frogOnRange.y-20,‘FROG HIT! x2 = +’+pts,C.gold,18);
ballFlights.push({tx:frogOnRange.x,ty:frogOnRange.y,t:0,score:0,hit:‘frog_hit’});
frogOnRange=null;
return;
}

TARGETS.forEach(t=>{
let d=dist(tx,ty,t.x,t.y);
if(d<minD){ minD=d; hit=t; }
});

let scored=hit && minD<(hit.r+38);
if(scored){
ballFlights.push({tx:hit.x,ty:hit.y,t:0,score:hit.pts,hit:‘target’,color:hit.color});
} else {
// Miss — ball lands, but if it would go past back fence, bounce it back
let landX=tx+rnd(-20,20);
let landY=ty+rnd(-10,10);
landX=clamp(landX,W*0.08,W*0.92);
// If aimed at top area (near back fence), bounce back to mid-range
if(landY<H*0.50) landY=H*0.52+rnd(0,H*0.1);
landY=clamp(landY,H*0.48,H*0.78);
ballFlights.push({tx:landX,ty:landY,t:0,score:0,hit:‘miss’});
}
}

function updateBallFlight(){
ballFlights = ballFlights.filter(b=>{
b.t+=0.032;
if(b.t>=1){
if(b.hit===‘target’){
totalScore+=b.score;
addFloat(b.tx,b.ty-20,’+’+b.score+’!’,b.color||C.gold,20);
if(b.score>=3 && Math.random()<0.4){
let npc=Math.random()<0.5?npcLeft:npcRight;
if(npc) addFloat(npc.x,npc.y-40,‘Great shot!’,C.white,11);
}
} else if(b.hit===‘miss’){
balls.push({x:b.tx,y:b.ty});
}
// bird/fox_hit/frog_hit handled at launch time
return false;
}
return true;
});
}

let dx=t.clientX-putt.touchStartX;
let dy=t.clientY-putt.touchStartY;
let rect=canvas.getBoundingClientRect();
let fromLowerHalf=(putt.touchStartY-rect.top)/rect.height>0.55;
if(fromLowerHalf && Math.hypot(dx,dy)>10){
doSwipeputt(Math.atan2(dy,dx), Math.hypot(dx,dy));
}
putt.touchStartY=null;
},{passive:true});

// Mouse swipe for desktop testing
let mouseDown=false, msx=0, msy=0;
canvas.addEventListener(‘mousedown’, e=>{
if(state!==‘halftime’) return;
mouseDown=true; msx=e.clientX; msy=e.clientY;
});
canvas.addEventListener(‘mouseup’, e=>{
if(state!==‘halftime’||!mouseDown) return;
mouseDown=false;
let dx=e.clientX-msx, dy=e.clientY-msy;
let rect=canvas.getBoundingClientRect();
let fromLowerHalf=(msy-rect.top)/rect.height>0.55;
if(fromLowerHalf && Math.hypot(dx,dy)>10){
doSwipeputt(Math.atan2(dy,dx), Math.hypot(dx,dy));
}
});

requestAnimationFrame(loop);

</script>
